name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - "user_data.sh"
      - ".github/workflows/terraform-apply.yml"

permissions:
  id-token: write   # required to fetch an OIDC token for AWS auth
  contents: read

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: "us-east-1"

# Prevents two applies from racing each other if commits land close together.
concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    name: Apply
    runs-on: ubuntu-latest
    # Ties this job to a GitHub Environment named "production". Configure
    # required reviewers on that environment in repo Settings > Environments
    # if you want a manual approval gate before every apply.
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug ARN length
        run: echo "ARN length is ${#AWS_ROLE_ARN}"
        env:
         AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan -no-color -out=tfplan

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan

      - name: Show outputs
        run: terraform output
